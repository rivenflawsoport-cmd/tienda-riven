<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIVEN FLAW | Streaming VIP</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&family=Montserrat:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: #000; 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        .bg-loki { 
            position: fixed; 
            inset: 0; 
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7)),
                linear-gradient(rgba(0, 30, 0, 0.5), rgba(0, 5, 0, 0.6)),
                url('img/streaming/fondo_streaming.webp'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            z-index: -10;
            opacity: 0.8;
        }

        /* DISEÑO DE 3 COLUMNAS COMPACTO EN MÓVILES */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding: 10px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        @media (min-width: 640px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(5, 1fr); } }

        /* TARJETA OPTIMIZADA Y COMPACTA EN ALTURA */
        .card-stream { 
            background: rgba(15, 23, 42, 0.9); 
            border-radius: 10px; 
            border: 1px solid rgba(102, 255, 0, 0.2); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
            transition: 0.3s; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            min-height: 125px; 
            cursor: pointer;
        }

        .card-stream:active { transform: scale(0.95); }

        .img-box { 
            width: 100%; 
            aspect-ratio: 16 / 9; /* Mantiene tus imágenes rectangulares sin deformar */
            position: relative; 
            overflow: hidden; 
            background: #000;
        }

        .img-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .info-container {
            padding: 6px 4px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            gap: 2px;
        }

        .product-name-label {
            font-size: 11px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 24px;
            align-items: center;
            justify-content: center;
        }

        .product-price-label {
            color: #66ff00;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 11px;
            font-style: italic;
        }

        @keyframes goldGlow {
            0%, 100% { border-color: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
            50% { border-color: #fff; box-shadow: 0 0 12px #fbbf24; }
        }
        .best-seller { animation: goldGlow 2s infinite ease-in-out; border-width: 1.5px !important; }
        .agotado { filter: grayscale(1) opacity(0.3); pointer-events: none; }

        /* CINTA DE MARQUESINA REESCALADA */
        @keyframes marquesina-infinita {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .cinta-movil {
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: #fbbf24; 
            color: #000;
            font-size: 8px;
            font-weight: 900;
            padding: 1px 0;
            z-index: 10;
        }

        .cinta-wrapper {
            display: inline-flex;
            white-space: nowrap;
            animation: marquesina-infinita 12s linear infinite;
        }

        .cinta-wrapper span {
            padding-right: 25px;
        }

        .section-title {
            grid-column: span 3;
            text-align: center;
            color: #66ff00;
            font-weight: 900;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin: 20px 0 8px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(102, 255, 0, 0.2);
            padding-bottom: 4px;
        }
        @media (min-width: 640px) { .section-title { grid-column: span 4; } }
        @media (min-width: 1024px) { .section-title { grid-column: span 5; } }

        .user-nav { background: rgba(0,15,0,0.95); border-bottom: 2px solid #66ff00; padding: 12px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="bg-loki"></div>

    <nav class="user-nav">
        <div class="flex justify-between items-center max-w-7xl mx-auto px-2 text-white">
            <div class="flex items-center gap-3">
                <a href="index.html" class="border border-gray-700 px-2 py-1 rounded-lg text-[10px] font-black uppercase italic">VOLVER</a>
                <div class="leading-none">
                    <p id="nav-name" class="text-[11px] font-black uppercase text-gray-300 italic">HOLA, INVITADO</p>
                    <p id="nav-saldo" class="text-[10px] font-black text-[#66ff00]">S/ 0.00</p>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="recompensas.html" class="bg-[#fbbf24] text-black text-[9px] font-black px-3 py-1.5 rounded-lg uppercase">PREMIOS 🎁</a>
                <a href="historial.html" id="btn-historial" class="hidden bg-white text-black text-[9px] font-black px-3 py-1.5 rounded-lg uppercase">🕒</a>
            </div>
        </div>
    </nav>

    <div id="catalog" class="product-grid mt-4"></div>

    <div id="modal-pago" class="modal" onclick="if(event.target==this) cerrarModales()">
        <div class="bg-[#0f172a] border-2 border-[#66ff00] p-7 rounded-3xl w-full max-w-sm text-center">
            <h2 id="m-title" class="font-impact italic text-2xl text-[#fbbf24] uppercase mb-6"></h2>
            <div id="m-options" class="flex flex-col gap-4"></div>
            <button onclick="cerrarModales()" class="mt-6 text-gray-500 text-[11px] font-bold uppercase underline">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configuración protegida contra bots rastreadores
        const firebaseConfig = { 
            apiKey: String.fromCharCode(65,73,122,97,83,121,65,102,82,77,108,100,66,69,75,65,54,48,115,120,54,103,84,110,74,74,84,86,53,113,111,53,84,71,56,109,101,103,107), 
            authDomain: "rivenflawstore.firebaseapp.com", 
            projectId: "rivenflawstore", 
            storageBucket: "rivenflawstore.firebasestorage.app", 
            messagingSenderId: "251566538187", 
            appId: "1:251566538187:web:ad54915d6f4a87e152ca4e" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userS = 0, userN = "Invitado", userI = "", selN = "", selP = 0;

        const data = [
            { n: "DÚO: HBO + PRIME", img: "duo1.webp", desde: "S/ 12", plans: [{ t: "Combo Dúo", p: 12 }] },
            { n: "DÚO: DISNEY + PRIME", img: "duo2.webp", desde: "S/ 12", plans: [{ t: "Combo Dúo", p: 12 }] },
            { n: "DÚO: DISNEY + HBO", img: "duo3.webp", desde: "S/ 12", plans: [{ t: "Combo Dúo", p: 12 }] },
            { n: "DÚO: DISNEY + NETFLIX", img: "duo4.webp", desde: "S/ 22", plans: [{ t: "Combo Dúo", p: 22 }] },
            { n: "DÚO: NETFLIX + HBO", img: "duo5.webp", desde: "S/ 19", plans: [{ t: "Combo Dúo", p: 19 }] },
            { n: "DÚO: NETFLIX + PRIME", img: "duo6.webp", desde: "S/ 19", plans: [{ t: "Combo Dúo", p: 19 }] },
            { n: "TRÍO: NETFLIX+DISNEY+PRIME", img: "trio1.webp", desde: "S/ 21 mensual", info: "MÍNIMO 2 MESES ⭐", plans: [{ t: "Referencia: 1 Mes (No disponible)", p: 21.00 }, { t: "CONTRATAR: Plan 2 meses", p: 42.00 }] },
            { n: "TRÍO: NETFLIX+DISNEY+HBO", img: "trio2.webp", desde: "S/ 22 mensual", info: "MÍNIMO 2 MESES ⭐", plans: [{ t: "Referencia: 1 Mes (No disponible)", p: 22.00 }, { t: "CONTRATAR: Plan 2 meses", p: 44.00 }] },
            { n: "TRÍO: NETFLIX+DISNEY+PARAMOUNT", img: "trio3.webp", desde: "S/ 23 mensual", info: "MÍNIMO 2 MESES ⭐", plans: [{ t: "Referencia: 1 Mes (No disponible)", p: 23.00 }, { t: "CONTRATAR: Plan 2 meses", p: 46.00 }] },
            { n: "FULL: 5 PLATAFORMAS", img: "full5.webp", desde: "S/ 28 mensual", info: "MÍNIMO 3 MESES ⭐", plans: [{ t: "Referencia: 1 Mes (No disponible)", p: 28.00 }, { t: "CONTRATAR: Plan 3 meses", p: 84.00 }] },
            { n: "FULL: SUPER 6 PLATAFORMAS", img: "full6.webp", desde: "S/ 31 mensual", info: "MÍNIMO 3 MESES ⭐", plans: [{ t: "Referencia: 1 Mes (No disponible)", p: 31.00 }, { t: "CONTRATAR: Plan 3 meses", p: 93.00 }] },
            { n: "Netflix Premium", img: "netflix.webp", gold: true, desde: "Desde S/ 10", plans: [{ t: "P. Propio", p: 15 }, { t: "P. Compartido", p: 10 }] },
            { n: "Disney+", img: "disney.webp", desde: "Desde S/ 5", plans: [{ t: "+ ESPN (1m)", p: 8 }, { t: "Sin ESPN (1m)", p: 5 }] },
            { n: "HBO Max", img: "hbo.webp", desde: "Desde S/ 7", plans: [{ t: "1 Mes", p: 7 }, { t: "2 Meses", p: 12 }] },
            { n: "Prime Video", img: "prime.webp", desde: "Desde S/ 7", plans: [{ t: "1 Mes", p: 7 }, { t: "3 Meses", p: 14 }] },
            { n: "Paramount+", img: "paramount.webp", desde: "Desde S/ 5", plans: [{ t: "1 Mes", p: 5 }, { t: "3 Meses", p: 12 }] },
            { n: "IPTV Premium", img: "iptv.webp", gold: true, desde: "Desde S/ 15", plans: [{ t: "1 Mes", p: 15 }, { t: "3 Meses", p: 30 }] },
            { n: "Crunchyroll Fan", img: "crunchy.webp", gold: true, desde: "Desde S/ 5", plans: [{ t: "1 Mes", p: 5 }, { t: "12 Meses", p: 18 }] },
            { n: "Capcut Pro", img: "capcut.webp", desde: "Desde S/ 15", plans: [{ t: "1 Mes", p: 15 }, { t: "3 Meses", p: 39 }] },
            { n: "Gemini AI Pro", img: "gemini.webp", gold: true, desde: "S/ 34", plans: [{ t: "18 Meses", p: 34 }] },
            { n: "Spotify Premium", img: "spotify.webp", ago: true, desde: "AGOTADO" },
            { n: "Canva Pro", img: "canva.webp", ago: true, desde: "AGOTADO" },
            { n: "YouTube Premium", img: "youtube.webp", ago: true, desde: "AGOTADO" }
        ];

        window.render = () => {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = "";
            const secciones = [
                { t: "🔥 COMBOS DÚOS", f: "DÚO" },
                { t: "💎 TRÍOS PROMOCIONALES", f: "TRÍO" },
                { t: "🚀 PLANES COMPLETOS (FULL)", f: "FULL" },
                { t: "📺 PLATAFORMAS INDIVIDUALES", f: "INDIVIDUAL" }
            ];

            secciones.forEach(sec => {
                const productos = data.filter(i => {
                    if (sec.f === "INDIVIDUAL") return !i.n.includes("DÚO") && !i.n.includes("TRÍO") && !i.n.includes("FULL");
                    return i.n.includes(sec.f);
                });

                if (productos.length > 0) {
                    catalog.innerHTML += `<div class="section-title">${sec.t}</div>`;
                    productos.forEach(i => {
                        const textoCinta = i.info ? i.info : `MEMBRESÍA VIP ⭐`;
                        const mostrarLoop = !i.n.includes("DÚO") && !i.ago && i.desde;
                        
                        catalog.innerHTML += `
                            <div class="card-stream ${i.gold ? 'best-seller' : ''} ${i.ago ? 'agotado' : ''}" 
                                 onclick="${i.ago ? '' : `abrirPlan('${i.n}', ${JSON.stringify(i.plans).replace(/"/g, '&quot;')})`}">
                                
                                ${mostrarLoop ? `
                                    <div class="cinta-movil">
                                        <div class="cinta-wrapper">
                                            <span>${textoCinta}</span>
                                            <span>${textoCinta}</span>
                                        </div>
                                    </div>
                                ` : ''}

                                <div class="img-box">
                                    <img src="img/streaming/${i.img}" onerror="this.src='https://placehold.co/400x225/000/66ff00?text=${i.n}'">
                                </div>
                                
                                <div class="info-container">
                                    <div class="product-name-label">${i.n}</div>
                                    <div class="product-price-label">${i.desde}</div>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        };

        window.abrirPlan = (n, plans) => {
            selN = n; selP = 0;
            document.getElementById('m-title').innerText = n;
            document.getElementById('m-options').innerHTML = plans.map(p => `
                <button onclick="seleccionarMetodo('${p.t}', ${p.p})" class="flex justify-between items-center bg-black/40 border-2 border-gray-700 p-4 rounded-2xl font-black uppercase hover:border-[#66ff00] transition-all">
                    <span class="text-white text-[11px]">${p.t}</span>
                    <span class="text-[#fbbf24] text-lg">S/ ${p.p.toFixed(2)}</span>
                </button>
            `).join('');
            document.getElementById('modal-pago').style.display = 'flex';
        };

        window.seleccionarMetodo = (tipo, precio) => {
            if (tipo.includes("Referencia") || tipo.includes("No disponible")) {
        alert("Este plan solo se vende a partir del mínimo indicado (2 o 3 meses). Por favor selecciona la opción completa.");
        return; 
    }
            selN = `${selN} (${tipo})`; selP = precio;
            document.getElementById('m-title').innerText = "FINALIZAR PEDIDO";
            document.getElementById('m-options').innerHTML = `
                <p class="text-[13px] text-gray-400 uppercase font-bold mb-2">Para entregarte tu cuenta de inmediato, coordina el pago por WhatsApp:</p>
                <button onclick="enviarWA()" class="w-full bg-[#25d366] text-white p-4 rounded-2xl font-black uppercase text-sm flex items-center justify-center gap-2 shadow-lg hover:scale-105 transition-transform">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.93 0c3.165.001 6.14 1.233 8.377 3.469 2.237 2.236 3.467 5.21 3.466 8.377-.003 6.582-5.338 11.93-11.87 11.93a11.85 11.85 0 0 1-5.694-1.46L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.725 1.451 5.416 0 9.825-4.41 9.829-9.829.001-2.624-1.022-5.09-2.885-6.954C16.425 1.958 13.957 1.954 11.93 1.954c-5.417 0-9.829 4.41-9.832 9.83-.001 1.84.482 3.633 1.4 5.2l-1.02 3.722 3.812-1l.357.212z"/>
                    </svg>
                    YAPE / PLIN POR WHATSAPP
                </button>
            `;
        };

        window.enviarWA = async () => {
            try {
                const { getFirestore, collection, addDoc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                
                await addDoc(collection(db, "pedidos"), { 
                    cliente_uid: userI || "invitado", 
                    cliente_nombre: userN || "Invitado", 
                    producto: `${selN} (STREAMING - WA)`, 
                    monto: selP, 
                    precio: selP,
                    player_id: "Streaming Manual", 
                    id_jugador: "Streaming",
                    server: "WhatsApp",
                    metodo: "PAGO QR / WA", 
                    fecha: serverTimestamp ? serverTimestamp() : new Date(), 
                    fecha_hora: new Date().toLocaleString(), 
                    estado: "pendiente" 
                });
            } catch (error) { 
                console.error("Error al registrar contabilidad:", error); 
            }

            const m = `*COMPRA RIVEN FLAW*\n👤 ${userN}\n📺 ${selN}\n💰 S/ ${selP.toFixed(2)}\n💳 PAGO QR / WHATSAPP`;
            window.location.href = `https://wa.me/51940511991?text=${encodeURIComponent(m)}`;
        };

        window.cerrarModales = () => { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                userI = u.uid;
                const s = await getDoc(doc(db, "usuarios", userI));
                if (s.exists()) {
                    const d = s.data();
                    userS = d.saldo || 0; userN = d.nombre || "Socio";
                    document.getElementById('nav-name').innerText = `HOLA, ${userN.split(' ')[0]}`;
                    document.getElementById('nav-saldo').innerText = `S/ ${userS.toFixed(2)}`;
                    document.getElementById('btn-historial').classList.remove('hidden');
                }
            } render();
        });
    </script>
</body>
</html>
