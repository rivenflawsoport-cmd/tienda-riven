<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVEN FLAW | Control Pro</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #0b0b0b; color: white; padding: 20px; }
        .pedido-card { transition: all 0.2s ease-in-out; }
        .pendiente { border-left: 4px solid #f97316; background: #1a1a1a; }
        .completado { border-left: 4px solid #a3e635; background: #0f170a; opacity: 0.6; }
        /* Animación para nuevos pedidos */
        @keyframes pulse-new { 0% { box-shadow: 0 0 0 0 rgba(163, 230, 53, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(163, 230, 53, 0); } 100% { box-shadow: 0 0 0 0 rgba(163, 230, 53, 0); } }
        .nuevo-pedido { animation: pulse-new 2s infinite; }
    </style>
</head>
<body>

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-center bg-[#111] p-6 rounded-2xl border border-gray-800">
            <div>
                <h1 class="text-3xl font-black italic uppercase text-[#a3e635]">Command Center</h1>
                <p id="stats" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Cargando estadísticas...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-700 p-3 rounded-xl text-xs font-bold transition-all">🔄</button>
            </div>
        </header>

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="filtrar('todos')" class="bg-[#a3e635] text-black px-4 py-1 rounded-full text-[10px] font-black uppercase">Todos</button>
            <button onclick="filtrar('pendiente')" class="bg-gray-800 text-gray-400 px-4 py-1 rounded-full text-[10px] font-black uppercase">Pendientes</button>
        </div>

        <div id="lista-pedidos" class="grid gap-3">
            <p id="cargando" class="text-center text-gray-600 animate-pulse uppercase font-black mt-10 text-xs">Sincronizando con la nube...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, deleteDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAfRMldBEKA60sx6gTnJJTV5qo5TG8megk", 
            authDomain: "rivenflawstore.firebaseapp.com", 
            projectId: "rivenflawstore", 
            storageBucket: "rivenflawstore.firebasestorage.app", 
            messagingSenderId: "251566538187", 
            appId: "1:251566538187:web:ad54915d6f4a87e152ca4e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONSULTA ÚNICA (Sin duplicados)
        const q = query(collection(db, "pedidos"));
        
        onSnapshot(q, (querySnapshot) => {
            const contenedor = document.getElementById('lista-pedidos');
            const cargando = document.getElementById('cargando');
            if(cargando) cargando.style.display = 'none';
            
            let pedidos = [];
            querySnapshot.forEach(doc => {
                const data = doc.data();
                pedidos.push({
                    id: doc.id,
                    ...data,
                    fecha_hora: data.fecha_hora || "Sin fecha",
                    monto: data.monto || data.precio || "0.00",
                    producto: data.producto || "PRODUCTO",
                    player_nick: data.player_nick || data.nick || "SIN NICK"
                });
            });

            // ORDENADO POR SEGUNDOS (MÁS NUEVOS ARRIBA)
            pedidos.sort((a, b) => {
                const tA = a.fecha?.seconds || 0;
                const tB = b.fecha?.seconds || 0;
                if (tA !== tB) return tB - tA;
                return b.fecha_hora.localeCompare(a.fecha_hora);
            });

            const pendientes = pedidos.filter(p => p.estado === 'pendiente').length;
            document.getElementById('stats').innerText = `${pendientes} PENDIENTES | ${pedidos.length} TOTAL`;

            contenedor.innerHTML = "";
            if (pedidos.length === 0) {
                contenedor.innerHTML = `<p class="text-center text-gray-600 mt-10 uppercase font-black">No hay pedidos</p>`;
                return;
            }

            pedidos.forEach(p => {
                const esPendiente = p.estado === 'pendiente';
                contenedor.innerHTML += `
                    <div id="card-${p.id}" class="pedido-card p-4 rounded-xl mb-2 flex justify-between items-center ${esPendiente ? 'pendiente nuevo-pedido' : 'completado'}">
                        <div class="flex-grow">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] text-gray-500 font-mono">${p.id.substring(0,6)}</span>
                                <span class="text-[9px] bg-[#a3e635] text-black px-2 font-black rounded italic uppercase">${p.producto}</span>
                            </div>
                            <h2 class="text-lg font-bold text-white mt-1 uppercase italic">${p.player_id || p.playerID || 'SIN ID'}</h2>
                            <p class="text-[11px] text-[#a3e635] font-black uppercase italic">NICK: ${p.player_nick}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase italic">INVITADO: <span class="text-white bg-neutral-800 px-1 rounded">${p.codigo_invitado || 'NINGUNO'}</span></p>
                            <p class="text-[9px] text-gray-500 font-bold mt-1 uppercase">${p.fecha_hora}</p>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <span class="text-sm font-black text-white italic">S/ ${p.monto}</span>
                            <div id="actions-${p.id}">
                                ${esPendiente 
                                    ? `<button onclick="entregarPedido('${p.id}', '${p.cliente_uid}', ${p.monto})" class="bg-[#a3e635] text-black font-black text-[10px] px-4 py-2 rounded-lg uppercase">Entregar</button>`
                                    : `<span class="text-[#a3e635] text-[10px] font-black italic uppercase">Completado</span>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        window.entregarPedido = async (id, uid, monto) => {
            const card = document.getElementById(`card-${id}`);
            if(card) {
                card.classList.remove('pendiente', 'nuevo-pedido');
                card.classList.add('completado');
            }
            try {
                await updateDoc(doc(db, "pedidos", id), { estado: "completado" });
                if (uid && uid !== "undefined" && uid !== "invitado") {
                    await updateDoc(doc(db, "usuarios", uid), { puntos: increment(Math.floor(monto)) });
                }
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
