<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIVEN FLAW | HONOR OF KINGS ELITE</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&family=Montserrat:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #050505; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .font-impact { font-family: 'Montserrat', sans-serif; }
        
        /* FONDO DINÁMICO */
        .bg-hok { 
            position: fixed; inset: 0; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('img/hok/fondo.webp'); 
            background-size: cover; background-position: center; z-index: -10;
        }

        /* NAVBAR ESTILO PREMIUM (Referencia image_85787f.png) */
        .user-nav { 
            background: rgba(0,0,0,0.95); border-bottom: 2px solid #fbbf24; 
            padding: 12px 20px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); 
        }

        /* GRID DE PRODUCTOS ESTILO DELTA FORCE (image_8574fe.jpg) */
        .product-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            padding: 25px 15px; max-width: 1200px; margin: 0 auto; 
        }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(5, 1fr); } }

        /* TARJETA DE PRODUCTO PROFESIONAL */
        .hok-card {
            background: #0d0d0d; border: 1.5px solid #1a1a1a; border-radius: 12px;
            overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; display: flex; flex-direction: column;
        }
        .hok-card:hover { 
            border-color: #fbbf24; transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(251, 191, 36, 0.15); 
        }

        /* CABECERA DORADA DE LA CARTA */
        .card-header { 
            background: #fbbf24; color: #000; font-weight: 900; font-size: 11px; 
            padding: 6px; text-align: center; text-transform: uppercase; letter-spacing: 1px;
        }

        /* CONTENEDOR DE IMAGEN (GRANDE Y COBERTURA TOTAL) */
        .img-box { 
            width: 100%; height: 220px; background: #000; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }
        .img-box img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .hok-card:hover .img-box img { transform: scale(1.1); }

        /* SECCIÓN DE PRECIO Y BOTÓN */
        .card-body { padding: 0; background: #000; border-top: 1px solid #1a1a1a; }
        .price-text { 
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic;
            font-size: 22px; color: #fbbf24; text-align: center; padding: 10px 0;
        }
        .btn-action { 
            width: 100%; background: #fbbf24; color: #000; font-weight: 900; 
            padding: 14px; text-transform: uppercase; font-size: 13px; cursor: pointer;
            border: none; transition: 0.2s;
        }
        .btn-action:hover { background: #fff; }

        /* ESTADO AGOTADO */
        .card-agotado { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .badge-agotado {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            color: #ff4444; font-weight: 900; font-size: 14px; z-index: 10;
        }

        /* MODALES */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); 
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-content { 
            background: #0a0a0a; border: 2px solid #fbbf24; padding: 35px; 
            border-radius: 25px; max-width: 400px; width: 100%; text-align: center; 
        }

        /* SEPARADORES */
        .section-title {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin: 40px 20px 10px; font-family: 'Montserrat', sans-serif; font-weight: 900;
            font-style: italic; color: #fbbf24; font-size: 1.5rem; text-transform: uppercase;
        }
        .section-title::before, .section-title::after {
            content: ""; flex: 1; height: 2px; background: linear-gradient(to right, transparent, #fbbf24, transparent);
        }
    </style>
</head>
<body>

    <div class="bg-hok"></div>

    <!-- NAVEGACIÓN -->
    <nav class="user-nav">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="border-2 border-gray-800 px-5 py-1.5 rounded-full text-[12px] font-black uppercase text-gray-300 hover:border-[#fbbf24]">VOLVER</a>
                <div class="flex flex-col">
                    <span id="display-name" class="text-[#fbbf24] font-black italic text-base uppercase leading-none">VERIFICANDO...</span>
                    <div class="flex gap-4 text-[10px] font-bold text-gray-500 uppercase mt-1">
                        <a href="historial.html" class="hover:text-white transition-colors">🕒 MI HISTORIAL</a>
                        <a href="recompensas.html" class="text-red-500 hover:text-red-400">🎁 RECOMPENSAS</a>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <div id="display-saldo" class="text-3xl font-black text-red-600 leading-none">S/ 0.00</div>
                <div class="flex items-center gap-2 justify-end mt-1">
                    <span id="display-puntos" class="text-[12px] font-black text-yellow-500 uppercase">0 PUNTOS ⭐</span>
                    <a href="https://wa.me/51940511991" class="bg-green-600 text-white px-3 py-1 rounded-md text-[10px] font-black uppercase shadow-lg shadow-green-900/20">RECARGAR</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-10 text-center">
        <h1 class="font-impact italic text-5xl text-white uppercase tracking-tighter">HONOR OF <span class="text-[#fbbf24]">KINGS</span></h1>
        <p class="text-gray-500 text-xs font-bold uppercase tracking-[8px] mt-2">Elite Recharge Center</p>
    </header>

    <div class="section-title">TOKENS OFICIALES</div>
    <div id="grid-tokens" class="product-grid"></div>

    <div class="section-title">PASES Y TARJETAS</div>
    <div id="grid-pases" class="product-grid"></div>

    <!-- MODAL DE PROCESAMIENTO -->
    <div id="modal-checkout" class="modal-overlay">
        <div class="modal-content">
            <h3 class="text-[#fbbf24] font-impact italic text-2xl mb-2 uppercase">CONFIRMAR PEDIDO</h3>
            <p id="checkout-item" class="text-gray-500 text-[11px] font-black mb-8 uppercase tracking-widest border-b border-gray-900 pb-2"></p>
            
            <input type="text" id="player-id" placeholder="ID DEL JUGADOR" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-white font-bold mb-4 outline-none text-center focus:border-[#fbbf24] text-xl uppercase">
            
            <!-- VALIDACIÓN DE TÉRMINOS (REQUISITO MANDATORIO) -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <input type="checkbox" id="check-terms" class="accent-[#fbbf24] w-5 h-5 cursor-pointer">
                <label for="check-terms" class="text-[11px] font-bold uppercase text-gray-400 cursor-pointer">
                    Acepto los <a href="terminos.html" class="text-[#fbbf24] underline">Términos y Condiciones</a>
                </label>
            </div>
            
            <button onclick="ejecutarCompra()" class="w-full bg-[#fbbf24] text-black font-black p-5 rounded-2xl uppercase text-sm shadow-xl shadow-yellow-500/30 active:scale-95 transition-transform">PROCESAR RECARGA</button>
            <button onclick="cerrarCheckout()" class="mt-6 text-gray-600 text-[11px] font-black uppercase underline tracking-widest block mx-auto hover:text-white">CANCELAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfRMldBEKA60sx6gTnJJTV5qo5TG8megk", authDomain: "rivenflawstore.firebaseapp.com", projectId: "rivenflawstore", storageBucket: "rivenflawstore.firebasestorage.app", messagingSenderId: "251566538187", appId: "1:251566538187:web:ad54915d6f4a87e152ca4e" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uid = "", saldo = 0, nombre = "", itemNom = "", itemPre = 0;

        const dataTokens = [
            {n:"16 Tokens", p:0, img:"h1.webp", stock:false},
            {n:"80 Tokens", p:3.49, img:"h2.webp", stock:true},
            {n:"240 Tokens", p:10.64, img:"h3.webp", stock:true},
            {n:"400 Tokens", p:17.41, img:"h4.webp", stock:true},
            {n:"560 Tokens", p:24.13, img:"h5.webp", stock:true},
            {n:"830 Tokens", p:33.88, img:"h6.webp", stock:true},
            {n:"1245 Tokens", p:51.11, img:"h7.webp", stock:true},
            {n:"2508 Tokens", p:99.13, img:"h8.webp", stock:true},
            {n:"4180 Tokens", p:164.61, img:"h9.webp", stock:true},
            {n:"8360 Tokens", p:328.22, img:"h10.webp", stock:true}
        ];

        const dataPases = [
            {n:"Tarjeta Naranja", p:0, img:"hp1.webp", stock:false},
            {n:"Tarjeta Azul", p:0, img:"hp2.webp", stock:false}
        ];

        window.renderizar = () => {
            const draw = (arr, id) => {
                document.getElementById(id).innerHTML = arr.map(i => `
                    <div class="hok-card ${!i.stock ? 'card-agotado' : ''}">
                        ${!i.stock ? '<div class="badge-agotado uppercase">Sin Stock</div>' : ''}
                        <div class="card-header">${i.n}</div>
                        <div class="img-box">
                            <img src="img/hok/${i.img}" onerror="this.src='img/hok/default.webp'">
                        </div>
                        <div class="card-body">
                            <div class="price-text">S/ ${i.p.toFixed(2)}</div>
                            <button onclick="abrirCheckout('${i.n}', ${i.p})" class="btn-action">${i.stock ? 'Adquirir Ahora' : 'Agotado'}</button>
                        </div>
                    </div>
                `).join('');
            }
            draw(dataTokens, 'grid-tokens');
            draw(dataPases, 'grid-pases');
        };

        window.abrirCheckout = (n, p) => {
            itemNom = n; itemPre = p;
            document.getElementById('checkout-item').innerText = `${n} — TOTAL: S/ ${p.toFixed(2)}`;
            document.getElementById('modal-checkout').style.display = 'flex';
        };

        window.cerrarCheckout = () => { document.getElementById('modal-checkout').style.display = 'none'; };

        window.ejecutarCompra = async () => {
            const pid = document.getElementById('player-id').value;
            const term = document.getElementById('check-terms').checked;

            if(!pid) return alert("Por favor, ingresa tu ID de jugador.");
            if(!term) return alert("Debes aceptar los términos y condiciones.");
            if(saldo < itemPre) return alert("Saldo insuficiente. Por favor, recarga tu cuenta.");

            if(confirm(`¿Deseas confirmar la compra de ${itemNom} por S/ ${itemPre.toFixed(2)}?`)){
                try {
                    // 1. Descontar Saldo y Sumar Puntos
                    await updateDoc(doc(db, "usuarios", uid), { 
                        saldo: increment(-itemPre), 
                        puntos: increment(Math.floor(itemPre)) 
                    });

                    // 2. Guardar Pedido en Colección Unificada 'pedidos'
                    await addDoc(collection(db, "pedidos"), {
                        cliente_uid: uid,
                        cliente_nombre: nombre,
                        producto: `HOK: ${itemNom}`,
                        monto: itemPre,
                        player_id: pid.toUpperCase(),
                        metodo: "Saldo Riven",
                        fecha: serverTimestamp(), // Vínculo con el nuevo orden del historial
                        fecha_hora: new Date().toLocaleString(),
                        estado: "pendiente"
                    });

                    alert("¡PEDIDO PROCESADO! Revisa tu historial.");
                    location.reload();
                } catch (e) { alert("Error al procesar. Verifica tu conexión."); }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uid = user.uid;
                const snap = await getDoc(doc(db, "usuarios", uid));
                if (snap.exists()) {
                    const d = snap.data();
                    saldo = d.saldo || 0; nombre = d.nombre || "Gamer";
                    document.getElementById('display-name').innerText = `HOLA, ${nombre.split(' ')[0].toUpperCase()}`;
                    document.getElementById('display-saldo').innerText = `S/ ${saldo.toFixed(2)}`;
                    document.getElementById('display-puntos').innerText = `${d.puntos || 0} PUNTOS ⭐`;
                }
            } else {
                document.getElementById('display-name').innerText = "HOLA, INVITADO";
            }
            renderizar();
        });
    </script>
</body>
</html>
