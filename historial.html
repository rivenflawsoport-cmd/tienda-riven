<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVEN FLAW | Mi Historial</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #0b0b0b; color: white; padding: 20px; }
        .pedido-card { background: #1a1a1a; border-radius: 12px; border-l-width: 4px; margin-bottom: 15px; }
        .pendiente { border-l-color: #f97316; }
        .completado { border-l-color: #a3e635; background: #0f170a; }
        .status-pendiente { color: #f97316; font-weight: 800; }
        .status-completado { color: #a3e635; font-weight: 800; }
        
        .btn-back { background: #a3e635; color: black; font-weight: 800; padding: 8px 20px; border-radius: 8px; text-decoration: none; display: inline-block; text-transform: uppercase; font-size: 12px; cursor: pointer; }
        
        /* BOTÓN ACTUALIZAR RIVEN STYLE */
        .btn-actualizar {
            background: #1a1a1a;
            color: #a3e635;
            border: 2px solid #a3e635;
            font-weight: 800;
            padding: 8px 15px;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-actualizar:active { transform: scale(0.9); background: #a3e635; color: black; }

        .btn-soporte {
            background: #25d366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 20px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <a onclick="window.history.back()" class="btn-back">← Volver</a>
            <button onclick="location.reload()" class="btn-actualizar">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                    <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                </svg>
                Actualizar Estado
            </button>
        </div>
        
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-black italic uppercase text-[#a3e635]">Mis Pedidos</h1>
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Historial Oficial de Clientes</p>
            
            <a href="https://wa.me/51940511991?text=Hola%20Riven,%20tengo%20una%20consulta%20sobre%20mis%20pedidos" class="btn-soporte">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.601 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
                ¿Necesitas ayuda? Contactar Soporte
            </a>
        </header>

        <div id="contenedor-historial" class="grid gap-4 pb-10 text-center">
            <p id="msg-carga" class="text-gray-600 animate-pulse uppercase font-black mt-10 text-xs">Cargando...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAfRMldBEKA60sx6gTnJJTV5qo5TG8megk", 
            authDomain: "rivenflawstore.firebaseapp.com", 
            projectId: "rivenflawstore", 
            storageBucket: "rivenflawstore.firebasestorage.app", 
            messagingSenderId: "251566538187", 
            appId: "1:251566538187:web:ad54915d6f4a87e152ca4e" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const contenedor = document.getElementById('contenedor-historial');
                
                try {
                    const q = query(collection(db, "pedidos"), where("cliente_uid", "==", user.uid));
                    const querySnapshot = await getDocs(q);
                    
                    document.getElementById('msg-carga').style.display = 'none';
                    contenedor.innerHTML = "";

                    if (querySnapshot.empty) {
                        contenedor.innerHTML = `<p class="text-gray-500 uppercase font-black">No hay pedidos registrados</p>`;
                        return;
                    }

                    let pedidosArr = [];
                    querySnapshot.forEach((doc) => {
                        pedidosArr.push(doc.data());
                    });

                    // BUSCA ESTA PARTE Y REEMPLÁZALA:
// REEMPLAZA TU BLOQUE DE SORT POR ESTE:
pedidosArr.sort((a, b) => {
    // Usamos el campo 'fecha' de Firebase para un orden matemático exacto
    const timeA = a.fecha && a.fecha.seconds ? a.fecha.seconds : Date.now();
    const timeB = b.fecha && b.fecha.seconds ? b.fecha.seconds : Date.now();
    
    return timeB - timeA; // El tiempo más grande (más reciente) va primero
});

                    // REEMPLAZA el bloque dentro del forEach en historial.html con esto:
pedidosArr.forEach((p) => {
    const esPendiente = (p.estado === "pendiente");
    
    // VÍNCULO DE ID: Busca player_id (Blood Strike) o playerID (Free Fire)
    const idVisible = p.player_id || p.playerID || p.id_jugador || "ID no detectado";
    
    // VÍNCULO DE PRECIO: Busca monto o precio
    const precioVisible = p.monto || p.precio || "0.00";

    contenedor.innerHTML += `
        <div class="pedido-card p-5 text-left ${esPendiente ? 'pendiente' : 'completado'}">
            <div class="flex justify-between items-center">
                <div>
                    <!-- Muestra el nombre del producto (ej: 'BS: 51 Oro' o '100 Diamantes') -->
                    <h2 class="text-lg font-black text-white uppercase italic leading-none">${p.producto}</h2>
                    <p class="text-[10px] text-gray-500 font-bold mt-1">${p.fecha_hora || 'Reciente'}</p>
                    <p class="text-xs mt-3">
                        <span class="text-gray-500 font-bold uppercase">ID JUGADOR:</span> 
                        <span class="text-[#a3e635] font-black">${idVisible}</span>
                    </p>
                </div>
                <div class="text-right">
                    <p class="text-white font-black text-lg">S/ ${parseFloat(precioVisible).toFixed(2)}</p>
                    <p class="text-[10px] font-black uppercase ${esPendiente ? 'status-pendiente' : 'status-completado'}">
                        ${esPendiente ? '⏳ Procesando' : '✅ Entregado'}
                    </p>
                </div>
            </div>
        </div>
    `;
});
                } catch (error) {
                    console.error(error);
                }
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
