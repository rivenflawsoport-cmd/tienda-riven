<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Historial de Premios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background: #050505; color: white; }
        .table-container { background: rgba(255,255,255,0.02); border: 1px solid #a3e63533; border-radius: 15px; overflow: hidden; }
        th { background: #a3e635; color: black; text-transform: uppercase; font-size: 12px; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .status-win { color: #a3e635; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-[#a3e635] mb-6 uppercase italic">Registro Oficial de Premios</h1>
        
        <div class="table-container">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th>Fecha / Hora</th>
                        <th>Usuario</th>
                        <th>Premio Ganado</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-premios">
                    <tr><td colspan="4" class="text-center py-10 text-gray-500">Cargando registros oficiales...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfRMldBEKA60sx6gTnJJTV5qo5TG8megk", authDomain: "rivenflawstore.firebaseapp.com", projectId: "rivenflawstore", storageBucket: "rivenflawstore.firebasestorage.app", messagingSenderId: "251566538187", appId: "1:251566538187:web:ad54915d6f4a87e152ca4e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarPremios() {
            const tbody = document.getElementById('tabla-premios');
            try {
                const q = query(collection(db, "historial_premios"), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);
                tbody.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const fecha = data.fecha ? new Date(data.fecha.seconds * 1000).toLocaleString() : "S/F";
                    tbody.innerHTML += `
                        <tr>
                            <td class="text-gray-400">${fecha}</td>
                            <td class="font-bold">${data.nombreUsuario}</td>
                            <td class="status-win">${data.premio}</td>
                            <td class="text-[10px] uppercase text-gray-500">Registrado ✅</td>
                        </tr>
                    `;
                });
            } catch (e) {
                tbody.innerHTML = "<tr><td colspan='4'>Error al cargar datos.</td></tr>";
            }
        }
        cargarPremios();
    </script>
</body>
</html>
