<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVEN FLAW | Miembro Oficial</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: #060606; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            /* Fondo con degradado sutil para profundidad */
            background-image: radial-gradient(circle at center, #0f1a04 0%, #060606 80%);
        }

        .auth-card { 
            background: rgba(10, 10, 10, 0.98); 
            border: 1px solid rgba(163, 230, 53, 0.15); 
            padding: 45px 35px; 
            border-radius: 28px; 
            width: 100%; 
            max-width: 430px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
        }

        /* Tabs de navegación con más separación */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 35px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            background: #a3e635;
            color: black;
            box-shadow: 0 4px 15px rgba(163, 230, 53, 0.2);
        }

        /* Espaciado elegante entre campos */
        .input-group {
            margin-bottom: 20px;
        }

        input { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 18px; 
            border-radius: 12px; 
            color: white; 
            outline: none; 
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: #a3e635; 
            background: rgba(163, 230, 53, 0.03);
            box-shadow: 0 0 10px rgba(163, 230, 53, 0.1);
        }

        /* Botón principal estilo Premium */
        .btn-action { 
            width: 100%; 
            background: #a3e635; 
            color: black; 
            padding: 18px; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 14px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-action:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(163, 230, 53, 0.4); 
            filter: brightness(1.1);
        }

        .btn-action:active { transform: translateY(-1px); }

        .form-container { display: none; }
        .form-container.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .info-text { 
            font-size: 11px; 
            color: #666; 
            text-align: center; 
            margin-top: 25px; 
            line-height: 1.6; 
            font-weight: 500;
        }
        .info-text b { color: #a3e635; font-weight: 800; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter" style="letter-spacing: -2px;">RIVEN <span class="text-[#a3e635]">FLAW</span></h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.4em] mt-2 font-bold opacity-70">Gaming Store & Services</p>
        </div>

        <div class="tabs">
            <div id="tab-login" class="tab-btn active" onclick="switchTab('login')">Entrar</div>
            <div id="tab-register" class="tab-btn" onclick="switchTab('register')">Registro</div>
        </div>

        <div id="form-login-container" class="form-container active">
            <form id="form-login">
                <div class="input-group">
                    <input type="email" id="log-email" placeholder="Correo Electrónico" required>
                </div>
                <div class="input-group">
                    <input type="password" id="log-pass" placeholder="Contraseña" required>
                </div>
                <button type="submit" id="btn-login" class="btn-action">Iniciar Sesión</button>
            </form>
        </div>

        <div id="form-register-container" class="form-container">
            <form id="form-registro">
                <div class="input-group">
                    <input type="text" id="reg-nombre" placeholder="Nombre Completo" required>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" placeholder="Correo Electrónico" required>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pass" placeholder="Contraseña (mín. 6 caracteres)" required>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-invitado" placeholder="CÓDIGO DE INVITADO (Ejem: RIVEN)" required>
                </div>
                <button type="submit" id="btn-registro" class="btn-action">Crear Cuenta</button>
                <p class="info-text">
    Al crear tu cuenta, aceptas los <a href="terminos.html" class="text-[#a3e635] underline hover:text-white transition-colors">términos y condiciones</a>. <br>
    Tu código es el que usarán tus amigos para darte <b>saldo gratis, puntos dentro de la pagina web RIVENSTORE.SHOP</b>.
</p>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfRMldBEKA60sx6gTnJJTV5qo5TG8megk",
            authDomain: "rivenflawstore.firebaseapp.com",
            projectId: "rivenflawstore",
            storageBucket: "rivenflawstore.firebasestorage.app",
            messagingSenderId: "251566538187",
            appId: "1:251566538187:web:ad54915d6f4a87e152ca4e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CAMBIO DE PESTAÑAS ---
        window.switchTab = function(type) {
            const loginForm = document.getElementById('form-login-container');
            const registerForm = document.getElementById('form-register-container');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (type === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabLogin.classList.remove('active');
                tabRegister.classList.add('active');
            }
        }

        // --- INICIAR SESIÓN ---
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html"; 
            } catch (error) {
                alert("Error: Correo o contraseña incorrectos.");
                btn.innerText = "INICIAR SESIÓN";
                btn.disabled = false;
            }
        });

        // --- REGISTRO DE NUEVO MIEMBRO ---
        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-registro');
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const nombre = document.getElementById('reg-nombre').value;
            const codigoInvitado = document.getElementById('reg-invitado').value.toUpperCase().trim();

            btn.innerText = "CREANDO CUENTA...";
            btn.disabled = true;
            // CANDADO: Verificar si el código de invitado ya está registrado por otro usuario
            try {
                const usuariosRef = collection(db, "usuarios");
                const q = query(usuariosRef, where("codigo_invitado", "==", codigoInvitado));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    alert("❌ Error: El código de invitado '" + codigoInvitado + "' ya está en uso por otro miembro. Por favor, elige uno diferente.");
                    btn.innerText = "CREAR CUENTA";
                    btn.disabled = false;
                    return; // Detiene el registro por completo
                }
            } catch (err) {
                console.error("Error al validar código:", err);
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                
                await setDoc(doc(db, "usuarios", userCredential.user.uid), {
                    nombre: nombre,
                    email: email,
                    codigo_invitado: codigoInvitado,
                    saldo: 0.00,
                    puntos: 0,
                    cupon_activo: 0,
                    fecha_registro: new Date().toISOString()
                });

                alert("¡Felicidades " + nombre + "! Tu cuenta RIVEN FLAW está activa.");
                window.location.href = "index.html";
            } catch (error) {
                alert("Error al registrar: " + error.message);
                btn.innerText = "CREAR CUENTA";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
