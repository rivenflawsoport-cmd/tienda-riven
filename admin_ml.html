<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVEN FLAW | Control MLBB</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #0b0b0b; color: white; padding: 20px; }
        .pedido-card { transition: all 0.2s ease-in-out; }
        .pendiente { border-left: 4px solid #3b82f6; background: #0f172a; }
        .completado { border-left: 4px solid #a3e635; background: #0f170a; opacity: 0.6; }
        
        @keyframes pulse-ml { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .nuevo-pedido { animation: pulse-ml 2s infinite; }
    </style>
</head>
<body>

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-center bg-[#111] p-6 rounded-2xl border border-gray-800">
            <div>
                <h1 class="text-3xl font-black italic uppercase text-[#3b82f6]">MLBB CENTER</h1>
                <p id="stats" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Sincronizando datos...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-700 p-3 rounded-xl text-xs font-bold transition-all">🔄</button>
            </div>
        </header>

        <div id="lista-pedidos" class="grid gap-3">
            <p id="cargando" class="text-center text-gray-600 animate-pulse uppercase font-black mt-10 text-xs">Escaneando pedidos de Mobile Legends...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, deleteDoc, increment, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAfRMldBEKA60sx6gTnJJTV5qo5TG8megk", 
            authDomain: "rivenflawstore.firebaseapp.com", 
            projectId: "rivenflawstore", 
            storageBucket: "rivenflawstore.firebasestorage.app", 
            messagingSenderId: "251566538187", 
            appId: "1:251566538187:web:ad54915d6f4a87e152ca4e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Apuntamos a la colección que configuramos en la tienda de ML
        const q = query(collection(db, "historial_pedidos"));
        
        onSnapshot(q, (querySnapshot) => {
            const contenedor = document.getElementById('lista-pedidos');
            document.getElementById('cargando').style.display = 'none';
            
            let pedidos = [];
            querySnapshot.forEach(doc => pedidos.push({id: doc.id, ...doc.data()}));

            // Ordenar por fecha (Más nuevos arriba)
            pedidos.sort((a, b) => b.fecha?.seconds - a.fecha?.seconds);

            const pendientes = pedidos.filter(p => p.estado === 'Pendiente').length;
            document.getElementById('stats').innerText = `${pendientes} PENDIENTES | ${pedidos.length} TOTAL MLBB`;

            contenedor.innerHTML = "";
            pedidos.forEach(p => {
                const esPendiente = p.estado === 'Pendiente';
                contenedor.innerHTML += `
                    <div id="card-${p.id}" class="pedido-card p-4 rounded-xl mb-2 flex justify-between items-center ${esPendiente ? 'pendiente nuevo-pedido' : 'completado'}">
                        <div class="flex-grow">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] bg-[#3b82f6] text-white px-2 font-black rounded italic uppercase">${p.item}</span>
                                <span class="text-[9px] text-gray-500 font-mono">${p.metodo}</span>
                            </div>
                            <div class="mt-2">
                                <h2 class="text-xl font-black text-white uppercase italic tracking-tighter">ID: ${p.id_jugador}</h2>
                                <h3 class="text-md font-bold text-[#3b82f6] uppercase italic">SERVER: ${p.server}</h3>
                            </div>
                            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">Cliente: ${p.usuario}</p>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <span class="text-lg font-black text-white italic">S/ ${parseFloat(p.monto).toFixed(2)}</span>
                            <div id="actions-${p.id}">
                                ${esPendiente 
                                    ? `<button onclick="entregarPedido('${p.id}')" class="bg-[#3b82f6] text-white font-black text-[10px] px-6 py-2 rounded-lg uppercase transition-all active:scale-95">Completar</button>`
                                    : `<span class="text-[#a3e635] text-[10px] font-black italic uppercase">Enviado</span>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        window.entregarPedido = async (id) => {
            const card = document.getElementById(`card-${id}`);
            const actions = document.getElementById(`actions-${id}`);
            
            card.classList.remove('pendiente', 'nuevo-pedido');
            card.classList.add('completado');
            actions.innerHTML = `<span class="text-[#3b82f6] text-[10px] font-black italic uppercase animate-pulse">Procesando...</span>`;

            try {
                await updateDoc(doc(db, "historial_pedidos", id), { estado: "Completado" });
            } catch (e) {
                alert("Error al actualizar pedido.");
                location.reload();
            }
        }
    </script>
</body>
</html>
